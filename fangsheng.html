<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 慈悲放生 - 回归自然</title>
    <style>
        :root {
            --bg: #f5f0e8;
            --panel-bg: rgba(255, 255, 255, 0.9);
            --text: #3d3226;
            --gold: #c8963e;
            --accent: #5b8c5a;
            --water: #3a7d8c;
            --btn-release: #e8814a;
            --btn-release-hover: #d0703a;
            --card-selected: #fff3e0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #e8ddd0 0%, #d5c9b5 30%, #c4b89d 60%, #b8a88a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
            padding: 10px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            background-attachment: fixed;
        }

        .main-container {
            width: 100%;
            max-width: 820px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center;
        }

        /* 标题区 */
        .header {
            text-align: center;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .header .icon-title {
            font-size: 2.2em;
            animation: floatIcon 3s ease-in-out infinite;
            filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.15));
        }
        @keyframes floatIcon {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        .header h1 {
            font-size: 1.8em;
            color: #4a3728;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.08);
        }
        .header .subtitle {
            font-size: 0.85em;
            color: #8b7355;
            letter-spacing: 0.08em;
            font-weight: 400;
        }

        /* Canvas容器 */
        .canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 10;
            max-height: 520px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-lg), 0 0 0 4px rgba(255, 255, 255, 0.5);
            cursor: default;
            background: #1a1a2e;
            transition: box-shadow 0.4s;
        }
        .canvas-wrapper:hover {
            box-shadow: var(--shadow-lg), 0 0 0 4px rgba(255, 255, 255, 0.6), 0 0 40px rgba(180, 140, 100, 0.25);
        }
        .canvas-wrapper canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* 点击涟漪提示 */
        .canvas-wrapper .click-hint {
            position: absolute;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 1em;
            letter-spacing: 0.05em;
            transition: opacity 0.8s;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            z-index: 2;
        }

        /* 面板 */
        .panel {
            background: var(--panel-bg);
            border-radius: 18px;
            padding: 16px 20px;
            width: 100%;
            max-width: 820px;
            box-shadow: var(--shadow);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.3s;
        }

        /* 动物选择卡片 */
        .animal-cards {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .animal-card {
            width: 70px;
            height: 82px;
            border-radius: 14px;
            border: 2.5px solid #e0d5c5;
            background: #fdfaf5;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: visible;
        }
        .animal-card:hover {
            transform: translateY(-4px);
            border-color: #c8963e;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            background: #fffef9;
        }
        .animal-card:active {
            transform: scale(0.94);
            transition: all 0.1s;
        }
        .animal-card.selected {
            border-color: #e8814a;
            background: var(--card-selected);
            box-shadow: 0 0 0 5px rgba(232, 129, 74, 0.18);
            animation: pulseCard 2s ease-in-out infinite;
        }
        @keyframes pulseCard {
            0%,
            100% {
                box-shadow: 0 0 0 5px rgba(232, 129, 74, 0.18);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(232, 129, 74, 0.05);
            }
        }
        .animal-card .emoji {
            font-size: 2.2em;
            transition: transform 0.3s;
            line-height: 1;
        }
        .animal-card:hover .emoji {
            transform: scale(1.15);
        }
        .animal-card .label {
            font-size: 0.72em;
            color: #6b5d4f;
            font-weight: 500;
            letter-spacing: 0.03em;
        }
        .animal-card .badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #e8814a;
            color: #fff;
            font-size: 0.6em;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        /* 放生按钮 */
        .btn-release {
            padding: 14px 32px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #f0905e 0%, #e07040 100%);
            color: #fff;
            font-size: 1.1em;
            font-weight: 700;
            letter-spacing: 0.06em;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(224, 112, 64, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }
        .btn-release::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .btn-release:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(224, 112, 64, 0.5);
            background: linear-gradient(135deg, #f5a070 0%, #e87850 100%);
        }
        .btn-release:active {
            transform: scale(0.95);
            box-shadow: 0 4px 14px rgba(224, 112, 64, 0.35);
            transition: all 0.1s;
        }
        .btn-release:active::after {
            width: 300px;
            height: 300px;
            transition: width 0s, height 0s;
            opacity: 0;
        }
        .btn-release .btn-icon {
            margin-right: 6px;
            font-size: 1.2em;
            vertical-align: -2px;
        }

        /* 统计区 */
        .stats {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            font-size: 0.9em;
            color: #5d4e3a;
            font-weight: 500;
        }
        .stat-item {
            background: #fdf8f0;
            border-radius: 25px;
            padding: 8px 16px;
            border: 1.5px solid #e8dcc8;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .stat-value {
            font-weight: 700;
            color: #c8783e;
            font-size: 1.15em;
            transition: all 0.3s;
        }
        .stat-value.pop {
            animation: popNum 0.5s ease-out;
        }
        @keyframes popNum {
            0% {
                transform: scale(1.5);
                color: #e04020;
            }
            100% {
                transform: scale(1);
                color: #c8783e;
            }
        }

        /* 提示语 */
        .blessing-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            pointer-events: none;
            z-index: 100;
            font-size: 1.6em;
            font-weight: 700;
            color: #4a3020;
            background: rgba(255, 255, 240, 0.95);
            padding: 12px 28px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 0.05em;
            white-space: nowrap;
        }
        .blessing-toast.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
        .blessing-toast.hide {
            transform: translate(-50%, -60%) scale(0.8);
            opacity: 0;
            transition: all 0.8s ease-in;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .canvas-wrapper {
                aspect-ratio: 4/3;
                max-height: 350px;
                border-radius: 14px;
            }
            .animal-card {
                width: 55px;
                height: 66px;
                border-radius: 10px;
                gap: 2px;
            }
            .animal-card .emoji {
                font-size: 1.6em;
            }
            .animal-card .label {
                font-size: 0.65em;
            }
            .btn-release {
                padding: 10px 22px;
                font-size: 0.9em;
            }
            .panel {
                padding: 10px 12px;
                gap: 8px;
                border-radius: 14px;
            }
            .header h1 {
                font-size: 1.3em;
            }
            .header .icon-title {
                font-size: 1.6em;
            }
            .stats {
                font-size: 0.75em;
                gap: 8px;
            }
            .stat-item {
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- 标题 -->
        <div class="header">
            <span class="icon-title">🌿</span>
            <div>
                <h1>慈悲放生</h1>
                <div class="subtitle">一念善心 · 万物共生</div>
            </div>
        </div>

        <!-- 场景画布 -->
        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="mainCanvas"></canvas>
            <div class="click-hint" id="clickHint">💧 点击水面也可放生</div>
        </div>

        <!-- 控制面板 -->
        <div class="panel" id="panel">
            <div class="animal-cards" id="animalCards">
                <div class="animal-card selected" data-type="fish">
                    <span class="emoji">🐟</span>
                    <span class="label">锦鲤</span>
                </div>
                <div class="animal-card" data-type="goldfish">
                    <span class="emoji">🐠</span>
                    <span class="label">金鱼</span>
                </div>
                <div class="animal-card" data-type="turtle">
                    <span class="emoji">🐢</span>
                    <span class="label">乌龟</span>
                </div>
                <div class="animal-card" data-type="frog">
                    <span class="emoji">🐸</span>
                    <span class="label">青蛙</span>
                </div>
                <div class="animal-card" data-type="crab">
                    <span class="emoji">🦀</span>
                    <span class="label">螃蟹</span>
                </div>
            </div>
            <button class="btn-release" id="btnRelease">
                <span class="btn-icon">🙏</span> 放 生
            </button>
            <div class="stats">
                <div class="stat-item">
                    🕊️ 已放生：<span class="stat-value" id="countReleased">0</span> 只
                </div>
                <div class="stat-item">
                    ✨ 功德：<span class="stat-value" id="countMerit">0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 祝福弹窗 -->
    <div class="blessing-toast" id="blessingToast"></div>

    <script>
        (function() {
            // ============ DOM元素 ============
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            const wrapper = document.getElementById('canvasWrapper');
            const clickHint = document.getElementById('clickHint');
            const btnRelease = document.getElementById('btnRelease');
            const countReleasedEl = document.getElementById('countReleased');
            const countMeritEl = document.getElementById('countMerit');
            const blessingToast = document.getElementById('blessingToast');
            const animalCardsContainer = document.getElementById('animalCards');

            // ============ 状态 ============
            let selectedAnimalType = 'fish';
            let countReleased = 0;
            let countMerit = 0;
            let canvasWidth, canvasHeight;
            let dpr = Math.min(window.devicePixelRatio || 1, 2);

            // ============ 动物类型配置 ============
            const animalConfig = {
                fish: {
                    emoji: '🐟',
                    name: '锦鲤',
                    size: 28,
                    speedRange: [0.3, 0.9],
                    depthRange: [0.25, 0.75],
                    color: '#f4a460',
                    meritValue: 3,
                    swimStyle: 'smooth',
                    preferSurface: false,
                },
                goldfish: {
                    emoji: '🐠',
                    name: '金鱼',
                    size: 24,
                    speedRange: [0.35, 0.85],
                    depthRange: [0.2, 0.7],
                    color: '#ff7043',
                    meritValue: 4,
                    swimStyle: 'smooth',
                    preferSurface: false,
                },
                turtle: {
                    emoji: '🐢',
                    name: '乌龟',
                    size: 32,
                    speedRange: [0.15, 0.4],
                    depthRange: [0.3, 0.85],
                    color: '#6d8c50',
                    meritValue: 6,
                    swimStyle: 'steady',
                    preferSurface: true,
                    surfaceTime: 0.3,
                },
                frog: {
                    emoji: '🐸',
                    name: '青蛙',
                    size: 26,
                    speedRange: [0.2, 0.6],
                    depthRange: [0.05, 0.5],
                    color: '#7cb342',
                    meritValue: 5,
                    swimStyle: 'bouncy',
                    preferSurface: true,
                    surfaceTime: 0.5,
                },
                crab: {
                    emoji: '🦀',
                    name: '螃蟹',
                    size: 24,
                    speedRange: [0.1, 0.35],
                    depthRange: [0.5, 0.9],
                    color: '#d84330',
                    meritValue: 4,
                    swimStyle: 'scuttle',
                    preferSurface: false,
                    bottomDweller: true,
                },
            };

            // ============ 场景参数 ============
            let waterSurfaceY; // 水面线Y坐标（动态计算）
            let waterBottomY; // 水底Y坐标
            let shoreY; // 岸边Y坐标
            let sceneOffsetY = 0; // 场景偏移

            // ============ 动物实例 ============
            let animals = [];
            const MAX_ANIMALS = 25;

            // ============ 粒子系统 ============
            let particles = [];
            let floatingTexts = [];
            let ripples = [];

            // ============ 场景装饰 ============
            let lilyPads = [];
            let clouds = [];
            let sparkles = [];

            // ============ 时间相关 ============
            let time = 0;
            let lastTime = performance.now();
            let deltaTime = 0;

            // ============ 初始化场景装饰 ============
            function initSceneDecor() {
                // 云朵
                clouds = [];
                for (let i = 0; i < 5; i++) {
                    clouds.push({
                        x: Math.random() * 800,
                        y: 30 + Math.random() * 80,
                        width: 60 + Math.random() * 100,
                        height: 25 + Math.random() * 35,
                        speed: 0.15 + Math.random() * 0.4,
                        opacity: 0.5 + Math.random() * 0.5,
                    });
                }
                // 荷叶
                lilyPads = [];
                for (let i = 0; i < 6; i++) {
                    lilyPads.push({
                        x: 80 + Math.random() * 640,
                        baseY: 0, // 将在resize时更新
                        size: 18 + Math.random() * 30,
                        phase: Math.random() * Math.PI * 2,
                        hasFlower: Math.random() < 0.35,
                    });
                }
                // 波光
                sparkles = [];
                for (let i = 0; i < 40; i++) {
                    sparkles.push({
                        x: Math.random() * 800,
                        baseY: 0,
                        size: 1 + Math.random() * 2.5,
                        phase: Math.random() * Math.PI * 2,
                        speed: 0.02 + Math.random() * 0.06,
                        opacity: 0.3 + Math.random() * 0.7,
                    });
                }
            }

            function updateLilyPadPositions() {
                const waterTop = waterSurfaceY;
                const waterBot = waterBottomY;
                lilyPads.forEach(pad => {
                    pad.baseY = waterTop + 15 + Math.random() * Math.min(80, (waterBot - waterTop) * 0.4);
                    pad.x = 40 + Math.random() * (canvasWidth - 80);
                });
                sparkles.forEach(s => {
                    s.baseY = waterTop + 5 + Math.random() * (waterBottomY - waterTop - 10);
                    s.x = Math.random() * canvasWidth;
                });
            }

            // ============ 画布大小调整 ============
            function resizeCanvas() {
                const rect = wrapper.getBoundingClientRect();
                canvasWidth = rect.width;
                canvasHeight = rect.height;
                canvas.width = canvasWidth * dpr;
                canvas.height = canvasHeight * dpr;
                canvas.style.width = canvasWidth + 'px';
                canvas.style.height = canvasHeight + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);

                // 重新计算场景关键位置
                waterSurfaceY = canvasHeight * 0.38;
                waterBottomY = canvasHeight * 0.92;
                shoreY = canvasHeight * 0.94;
                sceneOffsetY = 0;

                updateLilyPadPositions();
            }

            // ============ 绘制函数 ============
            function drawSky() {
                const grad = ctx.createLinearGradient(0, 0, 0, waterSurfaceY);
                grad.addColorStop(0, '#b8d8f0');
                grad.addColorStop(0.5, '#d4e8f8');
                grad.addColorStop(0.85, '#e8f2fa');
                grad.addColorStop(1, '#f0f5f9');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvasWidth, waterSurfaceY);

                // 太阳
                const sunX = canvasWidth * 0.78;
                const sunY = canvasHeight * 0.12;
                const sunR = canvasHeight * 0.08;
                // 光晕
                for (let i = 4; i >= 0; i--) {
                    const r = sunR + i * 20;
                    const alpha = 0.03 + i * 0.025;
                    ctx.fillStyle = `rgba(255,240,210,${alpha})`;
                    ctx.beginPath();
                    ctx.arc(sunX, sunY, r, 0, Math.PI * 2);
                    ctx.fill();
                }
                // 太阳本体
                const sunGrad = ctx.createRadialGradient(sunX, sunY, sunR * 0.3, sunX, sunY, sunR);
                sunGrad.addColorStop(0, '#fffef5');
                sunGrad.addColorStop(0.4, '#fff8dc');
                sunGrad.addColorStop(1, '#fdebd0');
                ctx.fillStyle = sunGrad;
                ctx.beginPath();
                ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawClouds() {
                clouds.forEach(cloud => {
                    const cx = cloud.x;
                    const cy = cloud.y;
                    const w = cloud.width;
                    const h = cloud.height;
                    ctx.fillStyle = `rgba(255,255,255,${cloud.opacity})`;
                    ctx.beginPath();
                    const r = h * 0.55;
                    // 多个圆弧组成云朵形状
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.arc(cx - w * 0.25, cy + h * 0.05, r * 0.8, 0, Math.PI * 2);
                    ctx.arc(cx + w * 0.22, cy - h * 0.08, r * 0.75, 0, Math.PI * 2);
                    ctx.arc(cx - w * 0.08, cy - h * 0.2, r * 0.7, 0, Math.PI * 2);
                    ctx.arc(cx + w * 0.3, cy + h * 0.1, r * 0.65, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            function drawMountains() {
                // 远山
                ctx.fillStyle = '#c8dac4';
                ctx.beginPath();
                ctx.moveTo(0, waterSurfaceY);
                const m1PeakX = canvasWidth * 0.25;
                const m1PeakY = waterSurfaceY - canvasHeight * 0.16;
                ctx.quadraticCurveTo(canvasWidth * 0.12, m1PeakY - 15, m1PeakX, m1PeakY);
                ctx.quadraticCurveTo(canvasWidth * 0.4, waterSurfaceY - canvasHeight * 0.04, canvasWidth * 0.5,
                waterSurfaceY);
                ctx.fill();

                ctx.fillStyle = '#bccfb5';
                ctx.beginPath();
                ctx.moveTo(canvasWidth * 0.35, waterSurfaceY);
                const m2PeakX = canvasWidth * 0.6;
                const m2PeakY = waterSurfaceY - canvasHeight * 0.2;
                ctx.quadraticCurveTo(canvasWidth * 0.48, m2PeakY - 20, m2PeakX, m2PeakY);
                ctx.quadraticCurveTo(canvasWidth * 0.75, waterSurfaceY - canvasHeight * 0.03, canvasWidth, waterSurfaceY);
                ctx.lineTo(canvasWidth, waterSurfaceY);
                ctx.fill();

                // 近山/树林
                ctx.fillStyle = '#9db892';
                ctx.beginPath();
                ctx.moveTo(0, waterSurfaceY);
                ctx.quadraticCurveTo(canvasWidth * 0.2, waterSurfaceY - canvasHeight * 0.07, canvasWidth * 0.35,
                    waterSurfaceY);
                ctx.quadraticCurveTo(canvasWidth * 0.5, waterSurfaceY - canvasHeight * 0.05, canvasWidth * 0.65,
                    waterSurfaceY);
                ctx.quadraticCurveTo(canvasWidth * 0.8, waterSurfaceY - canvasHeight * 0.06, canvasWidth,
                waterSurfaceY);
                ctx.lineTo(canvasWidth, waterSurfaceY + 5);
                ctx.lineTo(0, waterSurfaceY + 5);
                ctx.closePath();
                ctx.fill();

                // 山上的树点缀
                ctx.fillStyle = '#7a9e6b';
                const treePositions = [
                    [0.08, 0.06],
                    [0.15, 0.09],
                    [0.3, 0.05],
                    [0.42, 0.08],
                    [0.55, 0.04],
                    [0.7, 0.07],
                    [0.85, 0.05],
                    [0.92, 0.03]
                ];
                treePositions.forEach(([tx, th]) => {
                    const treeX = canvasWidth * tx;
                    const treeY = waterSurfaceY - canvasHeight * th;
                    const treeH = canvasHeight * th * 0.7;
                    ctx.beginPath();
                    ctx.moveTo(treeX, treeY);
                    ctx.lineTo(treeX - 8, treeY + treeH);
                    ctx.lineTo(treeX + 8, treeY + treeH);
                    ctx.closePath();
                    ctx.fill();
                });
            }

            function drawWaterSurface() {
                // 水面基底
                const waterGrad = ctx.createLinearGradient(0, waterSurfaceY, 0, waterBottomY);
                waterGrad.addColorStop(0, '#5a9ea8');
                waterGrad.addColorStop(0.15, '#4a8d96');
                waterGrad.addColorStop(0.5, '#3d7a85');
                waterGrad.addColorStop(0.85, '#2d6068');
                waterGrad.addColorStop(1, '#1e484f');
                ctx.fillStyle = waterGrad;
                ctx.fillRect(0, waterSurfaceY, canvasWidth, waterBottomY - waterSurfaceY);

                // 水面波动条纹
                for (let i = 0; i < 8; i++) {
                    const stripeY = waterSurfaceY + 8 + i * (waterBottomY - waterSurfaceY - 16) / 8;
                    const alpha = 0.03 + 0.02 * Math.sin(i * 1.2);
                    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    for (let x = 0; x < canvasWidth; x += 3) {
                        const waveY = stripeY + Math.sin(x * 0.02 + time * 0.001 + i * 0.7) * 5;
                        if (x === 0) ctx.moveTo(x, waveY);
                        else ctx.lineTo(x, waveY);
                    }
                    ctx.stroke();
                }

                // 水面线（波动）
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                for (let x = 0; x < canvasWidth; x += 2) {
                    const waveY = waterSurfaceY +
                        Math.sin(x * 0.015 + time * 0.002) * 6 +
                        Math.sin(x * 0.03 + time * 0.0035) * 3 +
                        Math.sin(x * 0.06 - time * 0.0015) * 1.5;
                    if (x === 0) ctx.moveTo(x, waveY);
                    else ctx.lineTo(x, waveY);
                }
                ctx.stroke();

                // 更亮的边缘线
                ctx.strokeStyle = 'rgba(255,255,255,0.35)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for (let x = 0; x < canvasWidth; x += 2) {
                    const waveY = waterSurfaceY +
                        Math.sin(x * 0.015 + time * 0.002) * 6 +
                        Math.sin(x * 0.03 + time * 0.0035) * 3 +
                        Math.sin(x * 0.06 - time * 0.0015) * 1.5 + 2;
                    if (x === 0) ctx.moveTo(x, waveY);
                    else ctx.lineTo(x, waveY);
                }
                ctx.stroke();
            }

            function drawSparkles() {
                sparkles.forEach(s => {
                    const waveOffset = Math.sin(s.x * 0.015 + time * 0.002) * 6 +
                        Math.sin(s.x * 0.03 + time * 0.0035) * 3;
                    const sy = s.baseY + waveOffset;
                    if (sy < waterSurfaceY || sy > waterBottomY) return;
                    const flicker = 0.5 + 0.5 * Math.sin(time * s.speed + s.phase);
                    const alpha = s.opacity * flicker;
                    ctx.fillStyle = `rgba(255,255,240,${alpha})`;
                    ctx.beginPath();
                    ctx.arc(s.x, sy, s.size, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            function drawLilyPads() {
                lilyPads.forEach(pad => {
                    const waveOffset = Math.sin(pad.x * 0.015 + time * 0.002) * 6 +
                        Math.sin(pad.x * 0.03 + time * 0.0035) * 3;
                    const py = pad.baseY + waveOffset;
                    if (py < waterSurfaceY + 8 || py > waterBottomY - 10) return;

                    // 荷叶
                    const padGrad = ctx.createRadialGradient(pad.x - pad.size * 0.15, py - pad.size * 0.1, pad
                        .size * 0.1, pad.x, py, pad.size);
                    padGrad.addColorStop(0, '#7db868');
                    padGrad.addColorStop(0.7, '#5a9445');
                    padGrad.addColorStop(1, '#3d7030');
                    ctx.fillStyle = padGrad;
                    ctx.beginPath();
                    ctx.ellipse(pad.x, py, pad.size, pad.size * 0.6, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 缺口
                    ctx.fillStyle = 'rgba(45,96,130,0.5)';
                    ctx.beginPath();
                    const notchAngle = pad.phase;
                    const notchX = pad.x + Math.cos(notchAngle) * pad.size * 0.75;
                    const notchY = py + Math.sin(notchAngle) * pad.size * 0.45;
                    ctx.moveTo(pad.x, py);
                    ctx.lineTo(notchX - 8, notchY - 4);
                    ctx.lineTo(notchX + 8, notchY + 4);
                    ctx.closePath();
                    ctx.fill();

                    // 睡莲花
                    if (pad.hasFlower) {
                        const flowerX = pad.x + pad.size * 0.3;
                        const flowerY = py - pad.size * 0.15;
                        const petalGrad = ctx.createRadialGradient(flowerX, flowerY, 2, flowerX, flowerY, pad
                            .size * 0.4);
                        petalGrad.addColorStop(0, '#fff0f5');
                        petalGrad.addColorStop(0.4, '#f8c8d8');
                        petalGrad.addColorStop(1, '#e898b0');
                        ctx.fillStyle = petalGrad;
                        for (let p = 0; p < 6; p++) {
                            const angle = (p / 6) * Math.PI * 2 + pad.phase;
                            const px = flowerX + Math.cos(angle) * pad.size * 0.25;
                            const py2 = flowerY + Math.sin(angle) * pad.size * 0.18;
                            ctx.beginPath();
                            ctx.arc(px, py2, pad.size * 0.18, 0, Math.PI * 2);
                            ctx.fill();
                        }
                        ctx.fillStyle = '#ffeaa7';
                        ctx.beginPath();
                        ctx.arc(flowerX, flowerY, pad.size * 0.14, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
            }

            function drawShore() {
                // 岸边
                const shoreGrad = ctx.createLinearGradient(0, waterBottomY, 0, canvasHeight);
                shoreGrad.addColorStop(0, '#8a9e6b');
                shoreGrad.addColorStop(0.3, '#9aae78');
                shoreGrad.addColorStop(0.7, '#b5bF8d');
                shoreGrad.addColorStop(1, '#c5c89a');
                ctx.fillStyle = shoreGrad;
                ctx.fillRect(0, waterBottomY, canvasWidth, canvasHeight - waterBottomY);

                // 岸边草
                ctx.fillStyle = '#7d9460';
                for (let x = 0; x < canvasWidth; x += 18) {
                    const grassH = 8 + Math.sin(x * 0.3) * 6 + Math.random() * 4;
                    const swayX = Math.sin(time * 0.002 + x * 0.04) * 3;
                    ctx.beginPath();
                    ctx.moveTo(x, waterBottomY);
                    ctx.quadraticCurveTo(x + swayX, waterBottomY - grassH * 0.7, x + swayX + 2, waterBottomY - grassH);
                    ctx.quadraticCurveTo(x + 4, waterBottomY - grassH * 0.5, x + 3, waterBottomY);
                    ctx.closePath();
                    ctx.fill();
                }

                // 岸边石头
                const stonePositions = [
                    [0.1, 0.96],
                    [0.22, 0.95],
                    [0.45, 0.97],
                    [0.6, 0.94],
                    [0.78, 0.96],
                    [0.9, 0.95]
                ];
                stonePositions.forEach(([sx, sy]) => {
                    const stoneX = canvasWidth * sx;
                    const stoneY = canvasHeight * sy;
                    const stoneR = 6 + Math.random() * 8;
                    const stoneGrad = ctx.createRadialGradient(stoneX - 1, stoneY - 1, stoneR * 0.2, stoneX,
                        stoneY, stoneR);
                    stoneGrad.addColorStop(0, '#d5cfc0');
                    stoneGrad.addColorStop(1, '#a09888');
                    ctx.fillStyle = stoneGrad;
                    ctx.beginPath();
                    ctx.arc(stoneX, stoneY, stoneR, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            function drawAnimalOnCanvas(animal) {
                ctx.save();
                const ax = animal.x;
                const ay = animal.y;
                const size = animal.size;
                const direction = animal.direction; // 1=右, -1=左

                // 水下深度影响透明度
                const depthRatio = (ay - waterSurfaceY) / (waterBottomY - waterSurfaceY);
                const depthAlpha = Math.max(0.35, 1 - depthRatio * 0.55);

                ctx.globalAlpha = depthAlpha * animal.opacity;
                ctx.translate(ax, ay);

                // 翻转方向
                if (direction === -1) {
                    ctx.scale(-1, 1);
                }

                // 绘制emoji
                ctx.font = `${size}px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "EmojiOne Color", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(animal.emoji, 0, 0);

                ctx.restore();

                // 如果动物在水面附近，画一个小涟漪
                if (ay < waterSurfaceY + 15 && ay > waterSurfaceY - 5 && animal.opacity > 0.6) {
                    const rippleAlpha = 0.25 * animal.opacity;
                    ctx.strokeStyle = `rgba(255,255,255,${rippleAlpha})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.ellipse(ax, waterSurfaceY + Math.sin(ax * 0.015 + time * 0.002) * 6, size * 0.7, size *
                        0.25, 0, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            function drawRipples() {
                ripples.forEach(rip => {
                    const progress = rip.age / rip.lifetime;
                    const alpha = (1 - progress) * 0.6;
                    const radius = rip.maxRadius * (0.2 + progress * 0.8);
                    const waveY = waterSurfaceY +
                        Math.sin(rip.x * 0.015 + time * 0.002) * 6 +
                        Math.sin(rip.x * 0.03 + time * 0.0035) * 3;
                    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
                    ctx.lineWidth = 2 * (1 - progress);
                    ctx.beginPath();
                    ctx.ellipse(rip.x, waveY, radius, radius * 0.4, 0, 0, Math.PI * 2);
                    ctx.stroke();

                    // 内圈
                    if (radius > 8) {
                        ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.6})`;
                        ctx.lineWidth = 1.2 * (1 - progress);
                        ctx.beginPath();
                        ctx.ellipse(rip.x, waveY, radius * 0.55, radius * 0.22, 0, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                });
            }

            function drawParticles() {
                particles.forEach(p => {
                    const alpha = p.opacity * (1 - p.age / p.lifetime);
                    ctx.fillStyle = `rgba(${p.color},${alpha})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            function drawFloatingTexts() {
                floatingTexts.forEach(ft => {
                    const progress = ft.age / ft.lifetime;
                    const alpha = 1 - progress;
                    const yOffset = -30 * progress;
                    ctx.fillStyle = `rgba(${ft.color},${alpha})`;
                    ctx.font = `bold ${ft.size}px "PingFang SC","Microsoft YaHei",sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText(ft.text, ft.x, ft.y + yOffset);
                });
            }

            // ============ 场景渲染 ============
            function renderScene() {
                ctx.clearRect(0, 0, canvasWidth, canvasHeight);

                drawSky();
                drawClouds();
                drawMountains();
                drawWaterSurface();
                drawSparkles();
                drawLilyPads();
                drawRipples();

                // 绘制所有动物（按Y排序，远处的先画）
                const sortedAnimals = [...animals].sort((a, b) => a.y - b.y);
                sortedAnimals.forEach(animal => drawAnimalOnCanvas(animal));

                drawParticles();
                drawFloatingTexts();
                drawShore();
            }

            // ============ 更新逻辑 ============
            function updateScene(dt) {
                // dt 以毫秒为单位
                const dtSec = dt / 1000;
                time += dt;

                // 更新云朵
                clouds.forEach(cloud => {
                    cloud.x += cloud.speed * dtSec * 15;
                    if (cloud.x > canvasWidth + 150) cloud.x = -150;
                    if (cloud.x < -150) cloud.x = canvasWidth + 150;
                });

                // 更新动物
                updateAnimals(dtSec);

                // 更新涟漪
                ripples = ripples.filter(r => {
                    r.age += dt;
                    return r.age < r.lifetime;
                });

                // 更新粒子
                particles = particles.filter(p => {
                    p.age += dt;
                    p.x += p.vx * dtSec;
                    p.y += p.vy * dtSec;
                    p.vy += 80 * dtSec; // 重力
                    return p.age < p.lifetime && p.y < canvasHeight;
                });

                // 更新浮动文字
                floatingTexts = floatingTexts.filter(ft => {
                    ft.age += dt;
                    return ft.age < ft.lifetime;
                });

                // 更新波光位置（随水面波动）
                sparkles.forEach(s => {
                    const waveOffset = Math.sin(s.x * 0.015 + time * 0.002) * 6 +
                        Math.sin(s.x * 0.03 + time * 0.0035) * 3;
                    s.baseY = Math.max(waterSurfaceY + 5, Math.min(waterBottomY - 5, s.baseY + (Math.sin(
                        time * s.speed + s.phase) * 0.3)));
                });

                // 荷叶微微浮动
                lilyPads.forEach(pad => {
                    pad.baseY += Math.sin(time * 0.001 + pad.phase) * 0.15;
                    pad.baseY = Math.max(waterSurfaceY + 10, Math.min(waterBottomY - 15, pad.baseY));
                });
            }

            function updateAnimals(dtSec) {
                animals.forEach(animal => {
                    // 放生动画
                    if (animal.releasing) {
                        animal.releaseProgress += dtSec / animal.releaseDuration;
                        if (animal.releaseProgress >= 1) {
                            animal.releasing = false;
                            animal.releaseProgress = 1;
                            animal.opacity = 1;
                            // 设置初始目标位置
                            animal.targetY = waterSurfaceY + (waterBottomY - waterSurfaceY) * (0.2 + Math
                            .random() * 0.55);
                            animal.vx = (0.3 + Math.random() * 0.5) * animal.direction;
                            animal.vy = 0;
                        } else {
                            const t = animal.releaseProgress;
                            // 缓入缓出
                            const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                            animal.x = animal.releaseStartX + (animal.releaseEndX - animal.releaseStartX) *
                                ease;
                            animal.y = animal.releaseStartY + (animal.releaseEndY - animal.releaseStartY) *
                                ease;
                            animal.opacity = 0.5 + t * 0.5;
                        }
                        return;
                    }

                    // 正常游动
                    const config = animalConfig[animal.type];
                    const waterTop = waterSurfaceY + 8;
                    const waterBot = waterBottomY - 15;

                    // 更新目标
                    animal.targetTimer -= dtSec;
                    if (animal.targetTimer <= 0) {
                        animal.targetTimer = 2 + Math.random() * 6;
                        animal.targetY = waterTop + (waterBot - waterTop) * (config.depthRange[0] + Math.random() *
                            (config.depthRange[1] - config.depthRange[0]));
                        // 偶尔改变方向
                        if (Math.random() < 0.3) {
                            animal.direction *= -1;
                            animal.vx = config.speedRange[0] + Math.random() * (config.speedRange[1] - config
                                .speedRange[0]);
                            animal.vx *= animal.direction;
                        }
                        // 更新速度
                        animal.vx = (config.speedRange[0] + Math.random() * (config.speedRange[1] - config
                            .speedRange[0])) * animal.direction;
                    }

                    // 特殊行为：乌龟和青蛙浮出水面
                    if (config.preferSurface) {
                        animal.surfaceTimer -= dtSec;
                        if (animal.surfaceTimer <= 0) {
                            animal.surfaceTimer = 8 + Math.random() * 20;
                            if (Math.random() < config.surfaceTime) {
                                animal.targetY = waterSurfaceY + 5 + Math.random() * 20; // 靠近水面
                            } else {
                                animal.targetY = waterTop + (waterBot - waterTop) * (config.depthRange[0] + Math
                                    .random() * (config.depthRange[1] - config.depthRange[0]));
                            }
                        }
                    }

                    // 底栖动物
                    if (config.bottomDweller) {
                        animal.targetY = waterBot - 5 - Math.random() * 20;
                    }

                    // 向目标移动
                    const dy = animal.targetY - animal.y;
                    const moveSpeedY = 15 + Math.random() * 20;
                    animal.y += Math.sign(dy) * Math.min(Math.abs(dy), moveSpeedY * dtSec);

                    // 水平移动
                    animal.x += animal.vx * 30 * dtSec;

                    // 边界检查
                    const margin = 30;
                    if (animal.x > canvasWidth - margin) {
                        animal.x = canvasWidth - margin;
                        animal.direction = -1;
                        animal.vx = -Math.abs(animal.vx);
                    }
                    if (animal.x < margin) {
                        animal.x = margin;
                        animal.direction = 1;
                        animal.vx = Math.abs(animal.vx);
                    }
                    if (animal.y > waterBot) animal.y = waterBot;
                    if (animal.y < waterSurfaceY + 3) animal.y = waterSurfaceY + 3;

                    // 微小摆动
                    animal.wobblePhase += animal.wobbleSpeed * dtSec;
                    animal.y += Math.sin(animal.wobblePhase) * animal.wobbleAmp * dtSec;
                });
            }

            // ============ 放生功能 ============
            function releaseAnimal(releaseX, releaseY) {
                if (animals.length >= MAX_ANIMALS) {
                    // 移除最早的动物
                    const oldest = animals.reduce((a, b) => a.birthTime < b.birthTime ? a : b);
                    animals = animals.filter(a => a !== oldest);
                }

                const config = animalConfig[selectedAnimalType];
                const size = config.size * (0.85 + Math.random() * 0.3);

                // 放生起始位置（在水面以上，岸边或点击位置上方）
                let startX, startY, endX, endY;
                if (releaseX !== undefined && releaseY !== undefined) {
                    // 点击放生
                    startX = releaseX;
                    startY = releaseY - 30;
                    endX = releaseX + (Math.random() - 0.5) * 80;
                    endY = Math.max(waterSurfaceY + 20, releaseY + 10);
                    // 确保在水中
                    if (endY < waterSurfaceY + 15) endY = waterSurfaceY + 20;
                    if (endY > waterBottomY - 20) endY = waterBottomY - 30;
                } else {
                    // 按钮放生 - 从岸边随机位置
                    startX = 50 + Math.random() * (canvasWidth - 100);
                    startY = shoreY - 5;
                    endX = startX + (Math.random() - 0.5) * 150;
                    endY = waterSurfaceY + 25 + Math.random() * (waterBottomY - waterSurfaceY - 50);
                }

                const direction = endX > startX ? 1 : -1;

                const animal = {
                    type: selectedAnimalType,
                    emoji: config.emoji,
                    x: startX,
                    y: startY,
                    size: size,
                    direction: direction,
                    vx: config.speedRange[0] * direction,
                    vy: 0,
                    targetY: endY,
                    targetTimer: 3 + Math.random() * 5,
                    opacity: 0.5,
                    wobblePhase: Math.random() * Math.PI * 2,
                    wobbleSpeed: 1.5 + Math.random() * 3,
                    wobbleAmp: 2 + Math.random() * 4,
                    birthTime: time,
                    releasing: true,
                    releaseProgress: 0,
                    releaseDuration: 0.8 + Math.random() * 0.6,
                    releaseStartX: startX,
                    releaseStartY: startY,
                    releaseEndX: endX,
                    releaseEndY: endY,
                    surfaceTimer: 5 + Math.random() * 10,
                };

                animals.push(animal);

                // 水花粒子
                const splashY = waterSurfaceY +
                    Math.sin(endX * 0.015 + time * 0.002) * 6 +
                    Math.sin(endX * 0.03 + time * 0.0035) * 3;
                for (let i = 0; i < 18; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 40 + Math.random() * 120;
                    particles.push({
                        x: endX,
                        y: splashY,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 60,
                        size: 1.5 + Math.random() * 3.5,
                        color: '220,240,255',
                        opacity: 0.9,
                        age: 0,
                        lifetime: 500 + Math.random() * 600,
                    });
                }

                // 涟漪
                ripples.push({
                    x: endX,
                    y: splashY,
                    age: 0,
                    lifetime: 1800 + Math.random() * 1000,
                    maxRadius: 30 + Math.random() * 50,
                });

                // 更新计数
                countReleased++;
                countMerit += config.meritValue;
                updateStatsDisplay();

                // 随机祝福语
                const blessings = [
                    '🙏 愿你自由自在',
                    '🌊 回归自然吧',
                    '✨ 善哉善哉',
                    '🕊️ 从此天高水阔',
                    '💚 一念善心',
                    '🌿 万物共生',
                    '🫧 去吧，小家伙',
                    '🌸 吉祥如意',
                    '🌟 自由地游吧',
                    '🍃 慈悲为怀',
                ];
                const blessing = blessings[Math.floor(Math.random() * blessings.length)];
                showBlessing(blessing);

                // 浮动文字
                floatingTexts.push({
                    x: endX,
                    y: splashY - 20,
                    text: `+${config.meritValue} 功德`,
                    size: 16,
                    color: '200,140,60',
                    age: 0,
                    lifetime: 2000,
                });

                // 隐藏点击提示
                if (clickHint.style.opacity !== '0') {
                    clickHint.style.transition = 'opacity 0.8s';
                    clickHint.style.opacity = '0';
                    setTimeout(() => {
                        if (clickHint.style.opacity === '0') {
                            clickHint.style.opacity = '1';
                            clickHint.style.transition = 'opacity 0.8s';
                        }
                    }, 5000);
                }
            }

            function updateStatsDisplay() {
                countReleasedEl.textContent = countReleased;
                countMeritEl.textContent = countMerit;
                // 弹跳动画
                countReleasedEl.classList.remove('pop');
                countMeritEl.classList.remove('pop');
                void countReleasedEl.offsetWidth;
                void countMeritEl.offsetWidth;
                countReleasedEl.classList.add('pop');
                countMeritEl.classList.add('pop');
            }

            function showBlessing(text) {
                blessingToast.textContent = text;
                blessingToast.classList.remove('hide');
                blessingToast.classList.add('show');
                clearTimeout(blessingToast._timeout);
                blessingToast._timeout = setTimeout(() => {
                    blessingToast.classList.remove('show');
                    blessingToast.classList.add('hide');
                }, 1800);
            }

            // ============ 事件处理 ============
            btnRelease.addEventListener('click', () => {
                releaseAnimal();
                // 按钮反馈
                btnRelease.style.transform = 'scale(0.9)';
                setTimeout(() => {
                    btnRelease.style.transform = '';
                }, 150);
            });

            // 点击水面放生
            canvas.addEventListener('click', (e) => {
                const rect = canvas.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const clickY = e.clientY - rect.top;
                // 检查是否点击在水面区域
                if (clickY >= waterSurfaceY - 10 && clickY <= waterBottomY + 5) {
                    releaseAnimal(clickX, clickY);
                }
            });

            // 动物卡片选择
            animalCardsContainer.addEventListener('click', (e) => {
                const card = e.target.closest('.animal-card');
                if (!card) return;
                const type = card.dataset.type;
                if (type && animalConfig[type]) {
                    selectedAnimalType = type;
                    // 更新选中状态
                    document.querySelectorAll('.animal-card').forEach(c => c.classList.remove(
                    'selected'));
                    card.classList.add('selected');
                }
            });

            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' || e.code === 'KeyR') {
                    e.preventDefault();
                    releaseAnimal();
                }
                const keys = ['Digit1', 'Digit2', 'Digit3', 'Digit4', 'Digit5'];
                const types = ['fish', 'goldfish', 'turtle', 'frog', 'crab'];
                const idx = keys.indexOf(e.code);
                if (idx >= 0 && types[idx]) {
                    selectedAnimalType = types[idx];
                    document.querySelectorAll('.animal-card').forEach(c => c.classList.remove('selected'));
                    const card = document.querySelector(`.animal-card[data-type="${types[idx]}"]`);
                    if (card) card.classList.add('selected');
                }
            });

            // 窗口大小调整
            window.addEventListener('resize', () => {
                resizeCanvas();
                // 重新约束动物位置
                animals.forEach(a => {
                    if (a.x > canvasWidth - 30) a.x = canvasWidth - 30;
                    if (a.y > waterBottomY - 10) a.y = waterBottomY - 10;
                    if (a.y < waterSurfaceY + 3) a.y = waterSurfaceY + 3;
                });
            });

            // ============ 初始动物 ============
            function spawnInitialAnimals() {
                const initialTypes = ['fish', 'fish', 'goldfish', 'turtle', 'frog', 'fish', 'turtle', 'goldfish'];
                initialTypes.forEach((type, i) => {
                    const config = animalConfig[type];
                    const size = config.size * (0.8 + Math.random() * 0.35);
                    const x = 60 + Math.random() * (canvasWidth - 120);
                    const waterTop = waterSurfaceY + 10;
                    const waterBot = waterBottomY - 20;
                    const y = waterTop + (waterBot - waterTop) * (config.depthRange[0] + Math.random() * (config
                        .depthRange[1] - config.depthRange[0]));
                    const direction = Math.random() > 0.5 ? 1 : -1;
                    animals.push({
                        type: type,
                        emoji: config.emoji,
                        x: x,
                        y: y,
                        size: size,
                        direction: direction,
                        vx: (config.speedRange[0] + Math.random() * (config.speedRange[1] - config
                            .speedRange[0])) * direction,
                        vy: 0,
                        targetY: y,
                        targetTimer: 3 + Math.random() * 6,
                        opacity: 1,
                        wobblePhase: Math.random() * Math.PI * 2,
                        wobbleSpeed: 1.5 + Math.random() * 3,
                        wobbleAmp: 2 + Math.random() * 4,
                        birthTime: time - (i * 2000),
                        releasing: false,
                        releaseProgress: 1,
                        releaseDuration: 0,
                        releaseStartX: x,
                        releaseStartY: y,
                        releaseEndX: x,
                        releaseEndY: y,
                        surfaceTimer: 5 + Math.random() * 10,
                    });
                });
                countReleased = initialTypes.length;
                countMerit = initialTypes.reduce((sum, t) => sum + animalConfig[t].meritValue, 0);
                updateStatsDisplay();
            }

            // ============ 主循环 ============
            function gameLoop(timestamp) {
                deltaTime = timestamp - lastTime;
                lastTime = timestamp;

                // 限制最大deltaTime避免跳帧问题
                const clampedDt = Math.min(deltaTime, 50);

                updateScene(clampedDt);
                renderScene();
                requestAnimationFrame(gameLoop);
            }

            // ============ 启动 ============
            function init() {
                resizeCanvas();
                initSceneDecor();
                updateLilyPadPositions();
                spawnInitialAnimals();
                updateStatsDisplay();
                lastTime = performance.now();
                requestAnimationFrame(gameLoop);

                // 几秒后淡化提示
                setTimeout(() => {
                    clickHint.style.opacity = '0.5';
                }, 6000);
            }

            // 页面加载完成后初始化
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            console.log('🌿 慈悲放生 - 已就绪');
            console.log('  🖱️ 点击水面放生 | 🙏 点击放生按钮 | ⌨️ 按空格键放生');
            console.log('  🔢 按键1-5切换动物：鱼/金鱼/乌龟/青蛙/螃蟹');
            console.log('  💧 水中已有', countReleased, '只小生灵在自由游动');
        })();
    </script>
</body>
</html>
